<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeetGPU Local</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1a1a2e; color: #e0e0e0; min-height: 100vh;
  }
  .header {
    background: #16213e; padding: 20px 40px; border-bottom: 1px solid #333;
    display: flex; align-items: center; gap: 12px;
  }
  .header h1 { font-size: 24px; color: #fff; }
  .header .badge { background: #0f3460; color: #4cc9f0; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
  .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
  .difficulty-section { margin-bottom: 32px; }
  .difficulty-title {
    font-size: 18px; font-weight: 600; margin-bottom: 12px; padding-bottom: 8px;
    border-bottom: 1px solid #333; display: flex; align-items: center; gap: 10px;
  }
  .difficulty-count { font-size: 13px; color: #888; font-weight: normal; }
  .badge-easy { color: #4ade80; }
  .badge-medium { color: #fbbf24; }
  .badge-hard { color: #f87171; }
  .challenge-list { list-style: none; }
  .challenge-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-radius: 6px; transition: background 0.15s;
  }
  .challenge-item:hover { background: #16213e; }
  .challenge-num { color: #666; font-size: 13px; min-width: 32px; text-align: right; }
  .challenge-link {
    color: #e0e0e0; text-decoration: none; font-size: 15px; flex: 1;
  }
  .challenge-link:hover { color: #4cc9f0; }
  .diff-badge {
    font-size: 11px; padding: 2px 8px; border-radius: 3px; font-weight: 600;
  }
  .diff-badge.easy { background: rgba(74,222,128,0.15); color: #4ade80; }
  .diff-badge.medium { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .diff-badge.hard { background: rgba(248,113,113,0.15); color: #f87171; }
</style>
</head>
<body>
  <div class="header">
    <h1>LeetGPU</h1>
    <span class="badge">LOCAL</span>
  </div>
  <div class="container">
    {% for diff in ['easy', 'medium', 'hard'] %}
    <div class="difficulty-section">
      <div class="difficulty-title">
        <span class="badge-{{ diff }}">{{ diff | capitalize }}</span>
        <span class="difficulty-count">({{ grouped[diff] | length }} challenges)</span>
      </div>
      <ul class="challenge-list">
        {% for entry in grouped[diff] %}
        <li class="challenge-item">
          <span class="challenge-num">{{ entry.number }}</span>
          <a class="challenge-link" href="/challenges/{{ entry.slug }}">{{ entry.display_name }}</a>
          <span class="diff-badge {{ diff }}">{{ diff | capitalize }}</span>
        </li>
        {% endfor %}
      </ul>
    </div>
    {% endfor %}
  </div>
</body>
</html>
